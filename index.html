<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>決鬥帳本</title>
  <script>
    (function () {
      const path = location.pathname;
      if (path.includes('/game-ledger')) {
        const base = document.createElement('base');
        base.href = location.origin + '/game-ledger/';
        document.head.prepend(base);
      }
    })();
  </script>
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>決鬥帳本</h1>
      <p class="subtitle">零和記帳 · 誰贏誰輸加總必為 0</p>
      <div id="syncBar" class="sync-bar">
        <span id="syncStatus">載入中...</span>
        <button type="button" class="btn btn-ghost btn-sm" id="refreshBtn" hidden>重新整理</button>
      </div>
    </header>

    <!-- 總覽 -->
    <section class="card summary-card">
      <div class="card-header">
        <h2>總和</h2>
        <div class="filter-bar">
          <label>篩選種類</label>
          <select id="filterType">
            <option value="all">全部</option>
            <option value="poker">德州扑克</option>
            <option value="mahjong">麻将</option>
            <option value="sports">体育</option>
          </select>
        </div>
      </div>
      <p class="hint-text">點擊參賽者可查看各項目總和與歷史記錄</p>
      <div id="summaryGrid" class="summary-grid"></div>
    </section>

    <!-- 新增記錄 -->
    <section class="card">
      <h2>新增記錄</h2>
      <form id="entryForm" class="entry-form">
        <div class="form-row">
          <div class="field">
            <label for="entryDate">日期</label>
            <input type="date" id="entryDate" required>
          </div>
          <div class="field">
            <label for="entryType">種類</label>
            <select id="entryType" required>
              <option value="poker">德州扑克</option>
              <option value="mahjong">麻将</option>
              <option value="sports">体育</option>
            </select>
          </div>
          <div class="field field-note">
            <label for="entryNote">備註（選填）</label>
            <input type="text" id="entryNote" placeholder="例如：週二局">
          </div>
        </div>

        <div id="scoreInputs" class="score-inputs"></div>

        <div class="balance-bar" id="balanceBar">
          <span class="balance-label">結算驗證</span>
          <span class="balance-value" id="balanceValue">0</span>
          <span class="balance-hint" id="balanceHint">✓ 平衡，可以儲存</span>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">儲存記錄</button>
      </form>
    </section>

    <!-- 歷史記錄 -->
    <section class="card">
      <div class="card-header">
        <h2>歷史記錄</h2>
        <div class="btn-group">
          <button type="button" class="btn btn-ghost" id="exportBtn">下載備份</button>
          <button type="button" class="btn btn-ghost" id="copyExportBtn">複製備份文字</button>
          <button type="button" class="btn btn-ghost" id="pasteImportBtn">貼上合併匯入</button>
        </div>
      </div>
      <p class="hint-text sync-hint" id="syncHint">
        <strong>多人記帳：</strong>每人記完後點「複製備份文字」貼到群組 → 其他人用「合併匯入」同步（不會蓋掉自己記的）。
      </p>
      <div class="table-wrap">
        <table class="ledger-table" id="ledgerTable">
          <thead id="ledgerHead"></thead>
          <tbody id="ledgerBody"></tbody>
        </table>
      </div>
      <p class="empty-hint" id="emptyHint">尚無記錄，請先新增一筆。</p>
    </section>

    <footer class="footer">
      <label class="btn btn-ghost btn-sm">
        合併匯入檔案
        <input type="file" id="importFile" accept=".json" hidden>
      </label>
      <button type="button" class="btn btn-ghost btn-sm" id="importOverwriteBtn">覆蓋匯入檔案</button>
      <input type="file" id="importOverwriteFile" accept=".json" hidden>
      <button type="button" class="btn btn-ghost btn-sm btn-danger" id="clearBtn">清除所有記錄</button>
    </footer>
  </div>

  <!-- 編輯 Modal -->
  <dialog id="editDialog" class="modal">
    <form id="editForm" method="dialog">
      <h3>編輯記錄</h3>
      <div class="form-row">
        <div class="field">
          <label for="editDate">日期</label>
          <input type="date" id="editDate" required>
        </div>
        <div class="field">
          <label for="editType">種類</label>
          <select id="editType" required>
            <option value="poker">德州扑克</option>
            <option value="mahjong">麻将</option>
            <option value="sports">体育</option>
          </select>
        </div>
      </div>
      <div id="editScoreInputs" class="score-inputs"></div>
      <div class="balance-bar" id="editBalanceBar">
        <span class="balance-label">結算驗證</span>
        <span class="balance-value" id="editBalanceValue">0</span>
        <span class="balance-hint" id="editBalanceHint"></span>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="editCancel">取消</button>
        <button type="submit" class="btn btn-primary" id="editSave">儲存</button>
      </div>
    </form>
  </dialog>

  <!-- 參賽者詳情 Modal -->
  <dialog id="playerDialog" class="modal modal-wide">
    <div id="playerDetail"></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" id="playerClose">關閉</button>
    </div>
  </dialog>

  <!-- 貼上匯入 Modal -->
  <dialog id="pasteDialog" class="modal">
    <form id="pasteForm" method="dialog">
      <h3>貼上合併匯入</h3>
      <p class="hint-text" style="margin-bottom: 12px;">
        貼上群組裡的備份文字。<strong>合併匯入</strong>會保留你本地記錄，並加入別人新增的項目。
      </p>
      <textarea id="pasteTextarea" class="paste-textarea" rows="10" placeholder="在這裡貼上 JSON..."></textarea>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="pasteCancel">取消</button>
        <button type="button" class="btn btn-ghost" id="pasteOverwrite">覆蓋匯入</button>
        <button type="submit" class="btn btn-primary" id="pasteConfirm">合併匯入</button>
      </div>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=3"></script>
  <script src="sync.js?v=3"></script>
  <script src="app.js?v=7"></script>
</body>
</html>
